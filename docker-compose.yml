version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: stockflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       inventario
      POSTGRES_USER:     gestor
      POSTGRES_PASSWORD: gestor123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor -d inventario"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/StockFlow
      dockerfile: Dockerfile
    container_name: stockflow_api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=inventario;Username=gestor;Password=gestor123;"
      Jwt__Secret:   "stockflow2026clave"
      Jwt__Issuer:   "StockFlow.API"
      Jwt__Audience: "StockFlow.Client"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
